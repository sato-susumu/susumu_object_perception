amcl:
  ros__parameters:
    use_sim_time: False
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan
    set_initial_pose: True
    initial_pose:
      x: 0.0
      y: 0.0
      yaw: 0.0

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"
    # 探索マッピングでは 100Hz tick は不要で CPU/TF 遅延の原因になるため 20Hz に抑える。
    bt_loop_duration: 50
    default_server_timeout: 20
    enable_groot_monitoring: True
    groot_zmq_publisher_port: 1666
    groot_zmq_server_port: 1667
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_compute_path_through_poses_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_goal_updater_node_bt_node
    - nav2_recovery_node_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_round_robin_node_bt_node
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_distance_traveled_condition_bt_node
    - nav2_single_trigger_bt_node
    - nav2_is_battery_low_condition_bt_node
    - nav2_navigate_through_poses_action_bt_node
    - nav2_navigate_to_pose_action_bt_node
    - nav2_remove_passed_goals_action_bt_node
    - nav2_planner_selector_bt_node
    - nav2_controller_selector_bt_node
    - nav2_goal_checker_selector_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # マッピング中は観測スピン・低速旋回・未知領域の迂回で局所的に足が遅くなる。
      # 0.5m/20s では広い world の sweep 中に "Failed to make progress" が出やすいので、
      # 探索用 params だけ判定を緩める。
      required_movement_radius: 0.2
      movement_time_allowance: 45.0
    
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      # 探索では最終姿勢(yaw)を問わない（位置に着けば新領域が見える）。yaw を厳しくすると
      # ゴール地点で姿勢調整の oscillate→"Failed to make progress"→到達失敗扱いで地図が
      # 育たない。yaw 実質無制限で「位置だけ合えば到達」。詳細は explore.yaml の同箇所コメント。
      yaw_goal_tolerance: 3.15

    # DWB parameters
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False
      min_vel_x: 0.0
      min_vel_y: 0.0
      # 屋外保存地図巡回では 0.22m/s だと waypoint 間の停止/再加速を含めた実効速度が低く、
      # 60s bounded 評価で 4/80 点に留まった。屋内標準 params と同じ TurtleBot3 waffle
      # 上限 0.26m/s に揃え、屋外だけ巡回スループットを上げる。
      max_vel_x: 0.26
      max_vel_y: 0.0
      # 旋回上限。0.17 だと slam の minimum_travel_heading に達せず地図が更新されず、0.3 だと
      # ゴール方向への向き直りが遅く DWB が "Failed to make progress" を多発しロボットが原点付近
      # から動けなかった（屋外で 1.6m 四方しか移動せず）。mode:=realtime で slam は安定したので
      # 0.6 に上げて経路追従を回復する（地図崩れは mode:=fast が主因で realtime なら 0.6 でも可）。
      max_vel_theta: 0.6
      min_speed_xy: 0.0
      max_speed_xy: 0.26
      min_speed_theta: 0.0
      # Add high threshold velocity for turtlebot 3 issue.
      # https://github.com/ROBOTIS-GIT/turtlebot3_simulations/issues/75
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 1.5
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -1.0
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 40
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.05
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      
controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # 実機 waffle 相当(半径~0.22m)に。0.1 は小さすぎて planner が壁ぎりぎりまで寄る
      # 経路を引き、マッピング中に壁へ衝突→自己位置がズレて地図が崩れる原因だった。
      robot_radius: 0.22
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # マッピング中に壁から十分離れるよう 0.35→0.5。大きすぎる(既定1.0)と狭い自由空間が
        # 高コストで埋まりフロンティアゴールへ planner が失敗するので、0.5 で衝突回避と
        # 到達性を両立する。
        inflation_radius: 0.5
        cost_scaling_factor: 3.0
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        footprint_clearing_enabled: True
        observation_persistence: 0.0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          inf_is_valid: True
          clearing: True
          marking: True
          data_type: "LaserScan"
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      # 【屋外専用】ロボット中心 40m 四方の rolling window。static 追従だと起動直後 costmap が
      # 数m で遠方ゴールが範囲外→planner 失敗で動けないため。これで未知領域への遠征ゴールも
      # costmap 内に収める。NavfnPlanner は広大な未知 costmap で「Failed to create a plan from
      # potential」(既知バグ#4655)を多発するので planner は下で Smac に変更している。
      rolling_window: true
      width: 40
      height: 40
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      # Global planning during SLAM should be based on the SLAM OccupancyGrid.
      # Raw /scan obstacle layers are kept out of the global costmap so a
      # transient mark under the robot cannot make the planner start cell
      # lethal. Local costmap still handles immediate obstacle avoidance.
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # マッピング中に壁から離れて衝突を防ぐ 0.5（local と揃える）。
        inflation_radius: 0.5
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    # 【屋外専用】NavfnPlanner は広大な未知領域を含む rolling costmap で「Failed to create a
    # plan from potential」(#4655)を多発するため、Smac 2D A* に変更。未知領域(allow_unknown)を
    # 越える経路をより安定して引け、屋外の遠征ゴールへ到達できる。
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    loop_rate: 2000
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      # 各ウェイポイント到達後の待機[ms]。巡回では待つ必要がないので 0。
      # 既定の 200(=0.2秒)程度でよく、大きいと巡回が完走しない。
      waypoint_pause_duration: 0

# === slam_toolbox（frontier 探索マッピング用のチューニング）===
# webots_city_mapping が nav_params_file としてこのファイルを渡し、nav2_bringup の
# slam_launch.py がこの slam_toolbox: セクションを読んで slam_toolbox を起動する
# （独立ファイルを別途渡す経路は bringup に無く、params_file 一本のみ中継される）。
#
# 【設計方針: odom 信頼寄り】検証で、Webots の odom + /scan + TF は健全（その場 1 回転で
# 点群を odom フレームに積むと壁が二重化せず 1 本に揃う）と確認済み。一方 MID-360 は
# 上向き偏重 FOV で水平の壁に当たる点が疎なため、slam_toolbox がスキャンマッチングで
# 無理に補正すると逆に壁をズラして地図が崩れる。そこで「odom を信頼し、スキャンマッチ
# 補正は控えめ」に振る:
#  - distance/angle_variance_penalty を小さく（0.2/0.3）: odom 予測解から離れにくくする
#    （slam_toolbox では penalty が小さいほど odom 予測を信頼）。
#  - correlation_search_space_dimension 0.5→0.2: マッチ探索窓を狭め、大きくズレない。
#  - coarse_search_angle_offset を 20deg→10deg に狭め、旋回時に別方向の特徴へ飛びにくくする。
#  - /scan は屋外 launch だけ高さ帯(z>=0.0, lidar_link基準, max_height=2.5m)で 2D 化
#    （launch 側 pointcloud_to_laserscan）。未ヒット ray は `+inf` のまま（use_inf:True）。
#    Karto は inf/range_max超えの ray を完全無視するので free 上書きは起きない。
#  - max_laser_range 15: 屋内(5〜10m)の遠い誤マッチを抑えつつ屋外の建物近傍も拾える妥協値。
#    18 に上げて遠方を活用しようとしたが scan match が不安定化し自己位置喪失したので 15 維持。
#  - loop closure 強め(search 5.0): 一周時に確実に閉じ壁の二重化を防ぐ。
slam_toolbox:
  ros__parameters:
    use_sim_time: True
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None
    mode: mapping
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 1.0
    resolution: 0.05
    max_laser_range: 15.0
    min_laser_range: 0.2
    minimum_time_interval: 0.3
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false
    # cycle13 の GPS truth 監視で、約80s以降に map 推定の heading が 50deg 級でずれた。
    # 移動/旋回を細かくノード化し、1回の scan matching が大きく姿勢を動かしにくい設定にする。
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.15
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 15.0
    link_match_minimum_response_fine: 0.15
    link_scan_maximum_distance: 1.5
    do_loop_closing: true
    loop_match_minimum_chain_size: 8
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.4
    loop_match_minimum_response_fine: 0.5
    loop_search_maximum_distance: 5.0
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03
    # スキャンマッチ探索窓を狭め odom 近傍のみ探索（大ズレ防止）。
    correlation_search_space_dimension: 0.2
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    # odom 信頼寄り: penalty を小さくし odom 予測解から離れにくくする。
    distance_variance_penalty: 0.2
    angle_variance_penalty: 0.3
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.1745
    coarse_angle_resolution: 0.01745
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
