controller_manager:
  ros__parameters:
    update_rate: 50

    diffdrive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diffdrive_controller:
  ros__parameters:
    left_wheel_names: ["left wheel motor"]
    right_wheel_names: ["right wheel motor"]

    wheel_separation: 0.16
    wheel_radius: 0.033

    # Same wheel calibration as webots_ros2_turtlebot/resource/ros2control.yml.
    wheel_separation_multiplier: 1.112

    use_stamped_vel: false
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    # robot_localization publishes odom->base_link in this evaluation mode.
    # Keep /diffdrive_controller/odom enabled, but stop the TF source to avoid
    # two publishers for the same edge.
    enable_odom_tf: false

    linear:
      x:
        max_velocity: 0.2

joint_state_broadcaster:
  ros__parameters:
    extra_joints:
      - LDS-01_secondary_motor
      - LDS-01_main_motor
